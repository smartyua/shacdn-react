name: UI

on:
  push:
    paths:
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "eslint.config.js"
      - "vitest.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ui.yml"
      - ".ladle/**"
      - "docs/COMPONENT_GUIDE.md"
  pull_request:
    paths:
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "eslint.config.js"
      - "vitest.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ui.yml"
      - ".ladle/**"
      - "docs/COMPONENT_GUIDE.md"

jobs:
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
