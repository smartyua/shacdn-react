# Optional AI services — NOT started by default lean bootstrap.
# Enable with: AI_VECTOR_PROVIDER=qdrant npm run ai:start
services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: shacdn-ai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - shacdn_ai_qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  shacdn_ai_qdrant:
